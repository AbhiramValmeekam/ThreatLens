# Central Configuration — ThreatLens (92-95% Accuracy Target)

# --- Paths ---
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  models: "models"
  reports: "reports"
  database: "data/prompt_injection.db"
  rules: "config/rules.yaml"

# --- Ensemble Weights ---
# Must sum to 1.0
ensemble:
  weights:
    deberta: 0.60
    svm: 0.15
    logistic_regression: 0.10
    rule_engine: 0.15

# --- Model Configuration ---
models:
  deberta:
    name: "microsoft/deberta-v3-base"
    max_length: 256
    batch_size: 16
    learning_rate: 2.0e-5
    num_epochs: 3
    warmup_ratio: 0.1
    weight_decay: 0.01

  svm:
    max_features: 50000
    ngram_range: [1, 4]
    sublinear_tf: true
    C: 0.5
    calibration_cv: 5

  logistic_regression:
    max_features: 30000
    ngram_range: [1, 3]
    sublinear_tf: true
    C: 0.8
    max_iter: 3000
    solver: saga

# --- Severity Thresholds ---
severity:
  low: 25
  medium: 50
  high: 75
  critical: 100

# --- Attack Categories ---
attack_categories:
  0: "Safe"
  1: "Prompt Injection"
  2: "Jailbreak"
  3: "Role Hijacking"
  4: "System Prompt Extraction"
  5: "Data Exfiltration"
  6: "Indirect Prompt Injection"
  7: "Tool Abuse Attempt"

# --- OWASP LLM Top 10 Mapping ---
owasp_mapping:
  "Prompt Injection": "LLM01 — Prompt Injection"
  "Jailbreak": "LLM01 — Prompt Injection"
  "Role Hijacking": "LLM01 — Prompt Injection"
  "System Prompt Extraction": "LLM06 — Sensitive Information Disclosure"
  "Data Exfiltration": "LLM06 — Sensitive Information Disclosure"
  "Indirect Prompt Injection": "LLM01 — Prompt Injection"
  "Tool Abuse Attempt": "LLM07 — Insecure Plugin Design"

# --- Data Split ---
data_split:
  train: 0.70
  validation: 0.15
  test: 0.15
  random_seed: 42
